<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calendiorama Atlas Temporis</title>
    <link rel="stylesheet" href="/static/css/style.css"> 
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
</head>
<body>
    <div id="map"></div>

    <!-- HTMX swap target: receives HTML fragment from /api/calendars/panel on country click -->
    <div id="calendar-panel"></div>

    <!-- Timeline: date input above + slider bar below.
         Note: <input type="date"> does not support BCE years — JS switches it to type="text" when year < 1. -->
    <div id="timeline-wrapper">
        <input type="date" id="date-input" value="2010-06-15" title="Enter a precise date (CE years only)">
        <div id="timeline">
            <!-- Tick marks (centuries + BCE millennia) injected by buildTicks() in map.js -->
            <div id="ticks"></div>
            <!-- Year label that follows the slider thumb — positioned by JS on every input event -->
            <div id="year-tooltip">2010 CE</div>
            <input type="range" id="year-slider" min="-3000" max="2100" step="1" value="2010">
        </div>
    </div>
    <!-- Calendar legend: swatch colors match CALENDAR_COLORS in map.js -->
    <div id="legend">
        <h4>Calendar</h4>
        <div class="legend-row"><span class="legend-swatch" style="background:#5b9bd5"></span> Gregorian</div>
        <div class="legend-row"><span class="legend-swatch" style="background:#7ec8e3"></span> Julian</div>
        <div class="legend-row"><span class="legend-swatch" style="background:#e8902a"></span> Hijri (Islamic)</div>
        <div class="legend-row"><span class="legend-swatch" style="background:#9b59b6"></span> Persian</div>
        <div class="legend-row"><span class="legend-swatch" style="background:#d4ac0d"></span> Hebrew</div>
        <div class="legend-row"><span class="legend-swatch" style="background:#e74c8c"></span> Japanese</div>
        <div class="legend-row"><span class="legend-swatch" style="background:#27ae60"></span> Coptic</div>
        <div class="legend-row"><span class="legend-swatch" style="background:#1a5276"></span> Ethiopian</div>
    </div>
    <!-- Dark/light mode toggle — must be before map.js so getElementById finds it -->
    <button id="theme-toggle" title="Toggle dark/light mode">🌙</button>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="/static/js/map.js"></script>
</body>
</html>

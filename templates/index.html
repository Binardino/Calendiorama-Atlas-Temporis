<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calendiorama Atlas Temporis</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <style>
        body { margin: 0; }
        #map { width: 100vw; height: 100vh; }

        /* Timeline bar: absolute overlay at the bottom center, above Leaflet layers */
        #timeline {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.88);
            padding: 8px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-family: sans-serif;
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
        }
        #year-label { min-width: 80px; text-align: center; font-weight: bold; }
        #year-slider { width: 420px; cursor: pointer; }

        /* Calendar panel: absolute overlay top-right, hidden until a country is clicked */
        #calendar-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 220px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: sans-serif;
            font-size: 13px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            display: none;   /* shown by JS after htmx.ajax() is called */
        }

    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Timeline slider: integer years, negative = BCE. No JS Date object used (unreliable pre-100 CE) -->
    <div id="timeline">
        <span>Year</span>
        <input type="range" id="year-slider" min="-3000" max="2010" step="1" value="2010">
        <span id="year-label">2010 CE</span>
    </div>
    <!-- HTMX swap target: receives HTML fragment from /api/calendars/panel -->
    <div id="calendar-panel"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="/static/js/map.js"></script>
</body>
</html>
